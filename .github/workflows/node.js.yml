name: PNPM Install & Health Check

on:
  push:
    branches: ['**']  # Run on all branches
  pull_request:
    branches: ['**']  # Run on all PRs
  workflow_dispatch:  # Enable manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Enforce 10-minute job timeout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm  # Cache pnpm store automatically

      - name: Enable Corepack and activate pnpm 10.9.0
        run: |
          corepack enable
          corepack prepare pnpm@10.9.0 --activate
          pnpm config set store-dir ~/.pnpm-store  # Explicitly set store directory

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Build project
        run: pnpm run build

