name: PNPM install & health check

on:
  push:
    branches: [ "**" ]
  workflow_dispatch: # Enables running workflow manually    

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 10  # Enforce 10-minute job timeout
    steps:
    - uses: actions/checkout@v4
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.9.0
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.11.0
        cache: 'pnpm'
    
    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run lint
      run: pnpm run lint

    - name: Run health-check
      run: pnpm run health-check

    - name: Run tests
      run: pnpm test

    - name: Build project
      run: pnpm run build
  