name: Install, lint, build and test

on:
  push:
    branches: [ "**" ]
  workflow_dispatch: # Enables running workflow manually    

jobs:
  build-and-test:
    runs-on: olliecaine/ultimate-app-nvm-20-pnpm-10:1.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint
        
      - name: Run build
        run: pnpm run build
        
      - name: Run test
        run: pnpm run test
