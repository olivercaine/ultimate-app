image: atlassian/default-image:4

options:
  max-time: 10 # Applies to each step (not total pipeline run). Can be overridden at step level.
  size: 2x # Use 4x size for steps to ensure sufficient resources
  clone:
    depth: full # Use full clone to ensure all git history is available for git commands
  runtime:
    cloud:
      arch: arm # Set ARM architecture globally for all steps    

definitions:
  caches:
    pnpm: .pnpm-store
    turbo: .turbo/cache
  
  services:
    size-1x-docker-memory:
      type: docker
      memory: 3072
    size-2x-docker-memory:
      type: docker
      memory: 7168
    size-4x-docker-memory:
      type: docker
      memory: 15360
    size-8x-docker-memory:
      type: docker
      memory: 31744
  
  steps:
    - step: &CreateBuildEnvironment
        name: Create build environment
        services:
          - size-1x-docker-memory
        caches:
          - pnpm
          - docker
          - turbo
        script:
          - docker build . -f Dockerfile.ci -t ci
          - docker save ci | gzip > ci.tar.gz
          - echo "Add script step `- docker load < ci.tar.gz` to your script to load the image in subsequent steps"
        artifacts:
          - ci.tar.gz

    - step: &InstallLintCompileAndBuild
        name: Install, lint, compile and build
        services:
          - size-1x-docker-memory
        caches:
          - pnpm
          - docker
          - turbo
        script:
          - docker load < ci.tar.gz
          - mkdir -p .pnpm-store .turbo/cache
          - chown -R root:root .pnpm-store .turbo/cache
          - chmod -R 777 .pnpm-store .turbo/cache
          - echo "Checking for .git directory:"
          - ls -alh .git || echo "No .git directory found"
          - >
            docker run --rm
            --user 0:0
            -e PNPM_STORE_DIR=/app/.pnpm-store
            -v ${PWD}/.git:/app/.git
            -v ${PWD}/.pnpm-store:/app/.pnpm-store
            -v ${PWD}/.turbo/cache:/app/.turbo/cache
            -v ${PWD}:/app
            -w /app
            ci sh -c '
              git --version &&
              git config --global --add safe.directory /app &&
              git checkout HEAD &&
              pnpm install --ignore-scripts --frozen-lockfile &&
              pnpm run lint &&
              pnpm run build &&
              pnpm run test
            '
        artifacts:
          - dist/**

pipelines:
  default:
    - step: *CreateBuildEnvironment
    - step: *InstallLintCompileAndBuild