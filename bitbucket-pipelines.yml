definitions:
  caches:
    pnpm: $BITBUCKET_CLONE_DIR/.pnpm-store

pipelines:
  default:
    - step:
        name: Build and test
        image: node:20.11.0
        script:
          - npm install --global corepack@latest
          - corepack enable
          - corepack prepare pnpm@10.10.0 --activate
          - pnpm install --frozen-lockfile
          - pnpm run lint
          - pnpm run build
          - pnpm run test
        caches:
          - pnpm