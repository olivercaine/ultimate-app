definitions:
  caches:
    pnpm: .pnpm-store
    turbo: .turbo
  steps:
    - step: &Install
        name: Install
        caches:
          - pnpm
          - turbo
        script:
          - npm install -g pnpm@8.15.8
          - pnpm install --frozen-lockfile

    - step: &Lint
        name: Lint
        caches:
          - pnpm
          - turbo
        script:
          - npm install -g pnpm@8.15.8 && pnpm install --frozen-lockfile # TODO - install to image
          - pnpm lint

    - step: &Build
        name: Build
        caches:
          - pnpm
          - turbo
        script:
          - npm install -g pnpm@8.15.8 && pnpm install --frozen-lockfile # TODO - install to image
          - pnpm build

pipelines:
  default:
    - step: *Install
    - parallel:
        - step: *Lint
        - step: *Build
