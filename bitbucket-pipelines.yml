pipelines:
  default:
    - step:
        name: Install & Health Check
        caches:
          - node
          - pnpm
          - turbo
        services:
          - docker  
        script:
          - docker run --rm -w /app -v ${PWD}:/app $(docker build . -q) sh -c 'pnpm install --frozen-lockfile && pnpm run lint && pnpm run build'

definitions:
  caches:
    pnpm: .pnpm-store
    turbo: .turbo