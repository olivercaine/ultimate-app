definitions:
  caches:
    pnpm: $BITBUCKET_CLONE_DIR/.pnpm-store
    turbo: .turbo/cache
  services:
    docker: 
      memory: 12000

pipelines:
  default:
    - step:
        name: Install, lint, build and test
        services:
          - docker
        caches:
          - pnpm
          - docker
          - turbo
        size: 4x
        # runs-on:
        #   - self.hosted
        #   - linux.arm64
        script:
          - docker build . -f Dockerfile.ci -t ci
          - >
            docker run --rm
            -v ${PWD}/.pnpm-store:/root/.pnpm-store
            -v ${PWD}:/app
            -w /app ci sh -c 'pnpm install --frozen-lockfile && pnpm run lint && pnpm run build && pnpm run test'