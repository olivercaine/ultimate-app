definitions:
  clone:
    depth: full
  caches:
    pnpm: .pnpm-store
    turbo: .turbo/cache
  # services:
  #   docker:
  #     memory: 12000

pipelines:
  default:
    - step:
        name: Install, lint, build and test
        services:
          - docker
        caches:
          - pnpm
          - docker
          - turbo
        # size: 4x
        # runs-on:
        #   - self.hosted
        #   - linux.arm64        
        script:
          - mkdir -p .pnpm-store .turbo/cache
          - chown -R root:root .pnpm-store .turbo/cache
          - chmod -R 777 .pnpm-store .turbo/cache
          - docker build . -f Dockerfile.ci -t ci
          - echo "Checking for .git directory:"
          - ls -alh .git || echo "No .git directory found"
          - >
            docker run --rm
            --user 0:0
            -e PNPM_STORE_DIR=/app/.pnpm-store
            -v ${PWD}/.git:/app/.git
            -v ${PWD}/.pnpm-store:/app/.pnpm-store
            -v ${PWD}/.turbo/cache:/app/.turbo/cache
            -v ${PWD}:/app
            -w /app
            ci sh -c '
              git --version &&
              git config --global --add safe.directory /app &&
              git checkout HEAD &&
              pnpm install --ignore-scripts --frozen-lockfile &&
              pnpm run lint &&
              pnpm run build &&
              pnpm run test
            '
