definitions:
  caches:
    pnpm: $BITBUCKET_CLONE_DIR/.pnpm-store

pipelines:
  default:
    - step:
        name: Install, lint, build and test
        image: olliecaine/ultimate-app-nvm-20-pnpm-10:1.0
        script:
          - pnpm install --frozen-lockfile
          - pnpm run lint
          - pnpm run build
          - pnpm run test
        caches:
          - pnpm